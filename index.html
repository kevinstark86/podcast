<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="stylesheet" href="./styles.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@300&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Pod request access landing page</title>
</head>
<body>
  <section>
    <div class="logo">
      <img src="./img/logo.svg" alt="">
    </div>
    <div class="content">
      <h1>PUBLISH YOUR PODCASTS</h1>
      <h1 class="h1-white">EVERYWHERE</h1>
      <div class="msg-wrapper">
        <p> Upload your audio to Pod with a single click. We’ll then distribute your podcast to Spotify,
          Apple Podcasts, Google Podcasts, Pocket Casts and more!</p>
      </div>
      <form action="submit">
        <input type="text" placeholder="john@mail.com">
        <button type="submit" class="submit-btn">Request Acesss</button>
      </form>
      <div class="brands-wrapper">
        <div class="brands"><img src="./img/spotify.svg" alt="spotify logo"></div>
        <div class="brands"><img src="./img/apple-podcast.svg" alt=""></div>
        <div class="brands"><img src="./img/google-podcasts.svg" alt=""></div>
        <div class="brands"><img src="./img/pocket-casts.svg" alt=""></div>
      </div>

    </div>
    <div class="large-img">
      <!--<img src="./img/image-host.jpg" alt="">-->
    </div>
    <div class="dots">
      <img src="./img/bg-pattern-dots.svg" alt="">
    </div>
  </section>
</body>
</html>
